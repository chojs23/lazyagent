name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag is on main
        id: check
        run: |
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on-main=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.on-main == 'true'
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_OWNER: ${{ github.repository_owner }}
      HOMEBREW_TAP_REPO: homebrew-tap
      HOMEBREW_TAP_BRANCH: main
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi

      - name: Run Go tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    # Runs only for real tag pushes, so manual workflow_dispatch on a
    # branch will not try to publish. Assumes the tag that triggered this
    # workflow already exists as a GitHub Release, since the postinstall
    # script fetches binaries from that release.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync package.json version to tag
        working-directory: npm
        run: |
          version="${GITHUB_REF_NAME#v}"
          node -e '
            const fs = require("node:fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = process.argv[1];
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          ' "$version"
          echo "published version: $version"

      - name: Publish to npm
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
