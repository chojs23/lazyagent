name: pr

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi

      - name: Run tests
        run: go test ./...
